<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面开发中 - 笨猫丫丫OPC</title>
    <link rel="icon" href="ico/yayasmart-002-128-128.ico" type="image/x-icon">
    <style>
        :root {
            --brand-primary: #005A53;
            --brand-accent: #B81F24;
            --nav-bg: #3D3D3D;
            --text-color: #1E293B;
            --text-sub: #64748B;
            --bg-light: #F8FAFC;
            --bg-gradient-start: #F8FAFC;
            --bg-gradient-end: #E2E8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: var(--text-color);
        }

        a {
            text-decoration: none;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.875rem;
            background: rgba(0, 85, 83, 0.1);
            color: var(--brand-primary);
            border-radius: 50px;
            font-size: 0.75rem;
            margin: 0 auto 1.5rem;
        }

        .status-badge .dot {
            width: 6px;
            height: 6px;
            background: var(--brand-primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            object-fit: contain;
            background: linear-gradient(135deg, rgba(0, 85, 83, 0.1), rgba(139, 92, 246, 0.1));
            padding: 10px;
            display: block;
        }

        h1 {
            font-size: 2.25rem;
            margin-bottom: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--brand-primary), #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-sub);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .video-wrapper {
            width: 320px;
            height: 240px;
            margin: 0 auto 2rem;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            background: linear-gradient(135deg, rgba(0, 85, 83, 0.05), rgba(139, 92, 246, 0.05));
            position: relative;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .features {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 2rem 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .features-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--brand-primary);
        }

        .features ul {
            list-style: none;
            padding: 0;
            display: grid;
            gap: 0.75rem;
        }

        .features li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-sub);
            padding: 0.5rem;
            background: linear-gradient(135deg, rgba(0, 85, 83, 0.02), transparent);
            border-radius: 12px;
        }

        .features li::before {
            content: '🐾';
            font-size: 1rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.875rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-primary), #007570);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 85, 83, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 85, 83, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-color);
            border: 1px solid #E2E8F0;
        }

        .btn-secondary:hover {
            background: white;
            border-color: var(--brand-primary);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 3rem;
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            color: var(--text-sub);
            font-size: 0.875rem;
            opacity: 0.7;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            min-width: 80px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--brand-primary);
            display: block;
        }

        .countdown-label {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 0.25rem;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.75rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .video-wrapper {
                width: 260px;
                height: 200px;
            }

            .countdown-item {
                min-width: 60px;
                padding: 0.75rem 1rem;
            }

            .countdown-number {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">
            <span class="dot"></span>
            功能开发中
        </div>

        <h1>页面正在开发中 🛠️</h1>
        
        <p class="subtitle">
            笨猫丫丫正在努力开发新功能...<br>
            敬请期待，精彩即将呈现！
        </p>

        <div class="video-wrapper">
            <video autoplay loop muted playsinline preload="auto">
                <source src="yayasmart-mp4/cat_status_working.mp4" type="video/mp4">
            </video>
        </div>

        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">天</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">时</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">分</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">秒</span>
            </div>
        </div>

        <div class="features">
            <div class="features-title">
                <span>🎯</span> 即将上线功能
            </div>
            <ul>
                <li>全新的用户界面设计</li>
                <li>智能学习陪跑系统</li>
                <li>OPC 技术支持中心</li>
                <li>个性化推荐功能</li>
            </ul>
        </div>

        <div class="actions">
            <a href="http://yayasmart.cn" class="btn btn-primary" target="_blank" rel="noopener">
                <span>🏠</span> 返回首页
            </a>
            <button class="btn btn-secondary" onclick="notifyMe()">
                <span>🔔</span> 提醒我
            </button>
        </div>

        <div class="footer">
            <p>笨猫丫丫OPC · 外表笨笨，内核聪明</p>
            <p style="margin-top: 0.25rem; font-size: 0.75rem;">联系客服：mall@yayasmart.com</p>
        </div>
    </div>

    <script>
        function updateCountdown() {
            const targetDate = new Date();
            targetDate.setDate(targetDate.getDate() + 15);
            targetDate.setHours(0, 0, 0, 0);

            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        function notifyMe() {
            if (Notification.permission === 'granted') {
                new Notification('笨猫丫丫OPC', {
                    body: '我们会在功能上线时通知您！',
                    icon: 'yayasmart-logo-all/yayasmart-3-logo-005A53.png'
                });
                alert('已设置提醒！功能上线时会通知您 🎉');
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        notifyMe();
                    }
                });
            }
        }
    </script>
</body>
</html>
