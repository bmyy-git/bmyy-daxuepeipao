<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面休息中 - 笨猫丫丫OPC</title>
    <link rel="icon" href="ico/yayasmart-002-128-128.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #005A53;
            --accent-color: #B81F24;
            --bg-color: #F8FAFC;
            --text-color: #334155;
            --text-sub: #64748B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: var(--text-color);
        }

        a {
            text-decoration: none;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .video-wrapper {
            width: 320px;
            height: 240px;
            margin: 0 auto 2rem;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            background: linear-gradient(135deg, rgba(0, 85, 83, 0.05), rgba(139, 92, 246, 0.05));
            position: relative;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .volume-toggle {
            position: absolute;
            bottom: 0.75rem;
            right: 0.75rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            color: white;
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
        }

        .volume-toggle:hover {
            background: rgba(0, 0, 0, 0.6);
            transform: scale(1.1);
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            object-fit: contain;
            background: linear-gradient(135deg, rgba(0, 85, 83, 0.1), rgba(139, 92, 246, 0.1));
            padding: 8px;
            display: block;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary-color), #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-sub);
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .cat-emoji {
            font-size: 1.5rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .tips {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: left;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .tips-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--primary-color);
        }

        .tips ul {
            list-style: none;
            padding: 0;
            color: var(--text-sub);
            font-size: 0.95rem;
        }

        .tips li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }

        .tips li::before {
            content: '🐾';
            position: absolute;
            left: 0;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.875rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #007570);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 85, 83, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 85, 83, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-color);
            border: 1px solid #E2E8F0;
        }

        .btn-secondary:hover {
            background: white;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            color: var(--text-sub);
            font-size: 0.875rem;
            opacity: 0.7;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.875rem;
            background: rgba(184, 31, 36, 0.1);
            color: var(--accent-color);
            border-radius: 50px;
            font-size: 0.75rem;
            margin: 0 auto 1.5rem;
        }

        .status-badge .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .video-wrapper {
                width: 260px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">
            <span class="dot"></span>
            服务器休息中
        </div>

        

        <h1>页面正在打盹中 <span class="cat-emoji">😴</span></h1>
        
        <p class="subtitle">
            哎呀，服务器好像有点累了...<br>
            笨猫丫丫正在努力恢复中，请稍等一下
        </p>

        <!-- 视频容器，提供圆角、阴影等样式 -->
        <div class="video-wrapper">
            <!-- 
                视频标签参数说明：
                autoplay  - 页面加载后自动播放（受浏览器策略限制）
                loop      - 循环播放，播放结束后自动从头开始
                playsinline - 内联播放（iOS Safari 支持，不强制全屏）
                preload="auto" - 页面加载时预加载视频数据
                id="mainVideo" - 视频元素唯一标识，供 JavaScript 控制
            -->
            <video autoplay loop playsinline preload="auto" id="mainVideo">
                <!-- 视频源文件配置 -->
                <source src="yayasmart-mp4/cat_status_idle.mp4" type="video/mp4">
            </video>
            <!-- 音量控制按钮：&#128266; 是音量图标(🔊)的 HTML 实体编码 -->
            <button class="volume-toggle" id="volumeBtn" onclick="toggleVolume()">&#128266;</button>
        </div>

        <div class="tips">
            <div class="tips-title">
                <span>💡</span> 可以试试这些方法
            </div>
            <ul>
                <li>检查网络连接是否正常</li>
                <li>刷新页面再试一次</li>
                <li>稍后再访问，我们会尽快恢复</li>
                <li>联系客服：mall@yayasmart.com</li>
            </ul>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="location.reload()">
                <span>🔄</span> 再来试试
            </button>
            <a href="http://yayasmart.cn" class="btn btn-secondary" target="_blank" rel="noopener">
                <span>🏠</span> 返回首页
            </a>
        </div>

        <div class="footer">
            <p>笨猫丫丫OPC · 外表笨笨，内核聪明</p>
            <p style="margin-top: 0.25rem; font-size: 0.75rem;">当前状态：服务器小憩中</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('mainVideo');
            const volumeBtn = document.getElementById('volumeBtn');
            video.volume = 0.5;
            video.muted = false;

            video.addEventListener('error', function() {
                video.style.display = 'none';
                document.querySelector('.video-wrapper').style.background = 'linear-gradient(135deg, rgba(0, 85, 83, 0.1), rgba(139, 92, 246, 0.1))';
            });

            video.addEventListener('ended', function() {
                video.currentTime = 0;
                video.play().then(() => {
                    video.muted = false;
                }).catch(e => {
                    console.log('Loop play failed, trying with muted');
                    video.muted = true;
                    video.play();
                });
            });

            let attempt = 0;
            const maxAttempts = 10;

            function tryAutoPlay() {
                video.play().then(() => {
                    console.log('Auto-play successful with sound!');
                    video.muted = false;
                    volumeBtn.innerHTML = '&#128266;';
                }).catch(e => {
                    console.log('Auto-play attempt ' + attempt + ' failed:', e.message);
                    attempt++;
                    if (attempt < maxAttempts) {
                        setTimeout(tryAutoPlay, 150 * attempt);
                    } else {
                        console.log('All auto-play attempts failed, falling back to muted');
                        video.muted = true;
                        video.play();
                        volumeBtn.innerHTML = '&#128263;';
                    }
                });
            }

            setTimeout(tryAutoPlay, 30);

            window.toggleVolume = function() {
                if (video.muted) {
                    video.muted = false;
                    video.volume = 0.5;
                    volumeBtn.innerHTML = '&#128266;';
                    video.play().catch(e => console.log('Play on unmute:', e));
                } else {
                    video.muted = true;
                    video.volume = 0;
                    volumeBtn.innerHTML = '&#128263;';
                }
            };

            document.addEventListener('click', function() {
                if (video.muted) {
                    video.muted = false;
                    video.volume = 0.5;
                    volumeBtn.innerHTML = '&#128266;';
                    video.play();
                }
            }, { once: true });
        });
    </script>
</body>
</html>
