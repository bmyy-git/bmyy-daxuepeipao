<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笨猫丫丫OPC · 日程日历</title>
    <link rel="icon" href="ico/yayasmart-002-128-128.ico" type="image/x-icon">
    <style>
        :root {
            --brand-primary: #005A53;
            --brand-accent: #B81F24;
            --nav-bg: #3D3D3D;
            --bg-light: #F8FAFC;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --card-bg: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        a { text-decoration: none; }

        header {
            background: var(--nav-bg);
            color: white;
            padding: 14px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header .logo { display: flex; align-items: center; gap: 10px; }
        header img { width: 36px; height: 36px; border-radius: 8px; }
        header h1 { font-size: 1.15rem; font-weight: 600; }
        header .header-actions { display: flex; gap: 16px; }
        header .header-actions a { color: rgba(255,255,255,0.8); font-size: 0.9rem; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .month-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--card-bg);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .nav-btn:hover { background: #F1F5F9; }
        .month-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-dark);
        }
        .add-event-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--brand-primary), #007570);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .add-event-btn:hover { box-shadow: 0 4px 15px rgba(0,85,83,0.3); }

        .calendar-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
        }

        .side-panel {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 80px;
        }
        .side-panel h3 {
            font-size: 1rem;
            color: var(--text-dark);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F1F5F9;
        }

        .today-card {
            background: linear-gradient(135deg, var(--brand-primary), #007570);
            color: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .today-card .date {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 4px;
        }
        .today-card .day {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .today-card .event-count {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 8px;
        }

        .event-list {
            list-style: none;
            padding: 0;
        }
        .event-item {
            display: flex;
            gap: 12px;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 8px;
        }
        .event-item:hover { background: #F8FAFC; }
        .event-item.active { background: rgba(0,85,83,0.05); border-left: 3px solid var(--brand-primary); }
        .event-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            min-width: 60px;
        }
        .event-content {
            flex: 1;
        }
        .event-content .title {
            font-size: 0.9rem;
            color: var(--text-dark);
            font-weight: 500;
        }
        .event-content .desc {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .event-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
        }
        .event-badge.blue { background: #3B82F6; }
        .event-badge.green { background: #10B981; }
        .event-badge.orange { background: #F59E0B; }

        .calendar-table {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .weekday-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        .weekday {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 12px 0;
            font-weight: 500;
        }
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .day-cell {
            aspect-ratio: 1;
            background: #F8FAFC;
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .day-cell:hover { background: #F1F5F9; }
        .day-cell.today {
            background: linear-gradient(135deg, var(--brand-primary), #007570);
            color: white;
        }
        .day-cell.other-month {
            opacity: 0.3;
        }
        .day-cell.selected {
            border: 2px solid var(--brand-primary);
            background: rgba(0,85,83,0.1);
        }
        .day-number {
            font-size: 0.9rem;
            font-weight: 500;
        }
        .day-events {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-top: 6px;
        }
        .mini-event {
            height: 4px;
            border-radius: 2px;
            flex: 1;
            max-height: 6px;
        }
        .mini-event.blue { background: #3B82F6; }
        .mini-event.green { background: #10B981; }
        .mini-event.orange { background: #F59E0B; }
        .mini-event.red { background: #EF4444; }

        @media (max-width: 800px) {
            .calendar-grid { grid-template-columns: 1fr; }
            .side-panel { position: static; }
            .month-title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="dashboard.html" class="header-actions">← 返回</a>
            <div class="logo">
                <img src="yayasmart-logo-all/yayasmart-3-logo-FFFFFF.png" alt="笨猫丫丫 Logo">
                <h1>日程日历</h1>
            </div>
            <button class="add-event-btn" onclick="addEvent()">+ 新建日程</button>
        </div>
    </header>

    <div class="container">
        <div class="calendar-header">
            <div class="month-nav">
                <button class="nav-btn">‹</button>
                <div class="month-title">2024年3月</div>
                <button class="nav-btn">›</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <button style="padding: 8px 16px; border: none; border-radius: 8px; background: var(--brand-primary); color: white; font-size: 0.85rem; cursor: pointer;">今天</button>
            </div>
        </div>

        <div class="calendar-grid">
            <div class="side-panel">
                <div class="today-card">
                    <div class="date">2024年3月15日</div>
                    <div class="day">15</div>
                    <div class="event-count">今天有 3 个日程</div>
                </div>

                <h3>📅 今日日程</h3>
                <ul class="event-list">
                    <li class="event-item active">
                        <div class="event-time">09:00</div>
                        <div class="event-content">
                            <div class="title">高数习题课</div>
                            <div class="desc">逸夫楼 B302</div>
                        </div>
                        <div class="event-badge blue"></div>
                    </li>
                    <li class="event-item">
                        <div class="event-time">14:00</div>
                        <div class="event-content">
                            <div class="title">导师会议</div>
                            <div class="desc">线上会议</div>
                        </div>
                        <div class="event-badge green"></div>
                    </li>
                    <li class="event-item">
                        <div class="event-time">19:00</div>
                        <div class="event-content">
                            <div class="title">算法刷题</div>
                            <div class="desc">图书馆自习室</div>
                        </div>
                        <div class="event-badge orange"></div>
                    </li>
                </ul>
            </div>

            <div class="calendar-table">
                <div class="weekday-header">
                    <div class="weekday">日</div>
                    <div class="weekday">一</div>
                    <div class="weekday">二</div>
                    <div class="weekday">三</div>
                    <div class="weekday">四</div>
                    <div class="weekday">五</div>
                    <div class="weekday">六</div>
                </div>
                <div class="days-grid">
                    <div class="day-cell other-month"><div class="day-number">25</div></div>
                    <div class="day-cell other-month"><div class="day-number">26</div></div>
                    <div class="day-cell other-month"><div class="day-number">27</div></div>
                    <div class="day-cell other-month"><div class="day-number">28</div></div>
                    <div class="day-cell"><div class="day-number">1</div><div class="day-events"><div class="mini-event blue"></div></div></div>
                    <div class="day-cell"><div class="day-number">2</div><div class="day-events"><div class="mini-event green"></div></div></div>
                    <div class="day-cell"><div class="day-number">3</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">4</div><div class="day-events"><div class="mini-event orange"></div><div class="mini-event blue"></div></div></div>
                    <div class="day-cell"><div class="day-number">5</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">6</div><div class="day-events"><div class="mini-event green"></div></div></div>
                    <div class="day-cell"><div class="day-number">7</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">8</div><div class="day-events"><div class="mini-event red"></div></div></div>
                    <div class="day-cell"><div class="day-number">9</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">10</div><div class="day-events"><div class="mini-event blue"></div></div></div>
                    <div class="day-cell"><div class="day-number">11</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">12</div><div class="day-events"><div class="mini-event green"></div><div class="mini-event orange"></div></div></div>
                    <div class="day-cell"><div class="day-number">13</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">14</div><div class="day-events"><div class="mini-event blue"></div></div></div>
                    <div class="day-cell today selected"><div class="day-number">15</div><div class="day-events"><div class="mini-event blue"></div><div class="mini-event green"></div><div class="mini-event orange"></div></div></div>
                    <div class="day-cell"><div class="day-number">16</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">17</div><div class="day-events"><div class="mini-event green"></div></div></div>
                    <div class="day-cell"><div class="day-number">18</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">19</div><div class="day-events"><div class="mini-event blue"></div><div class="mini-event orange"></div></div></div>
                    <div class="day-cell"><div class="day-number">20</div><div class="day-events"><div class="mini-event red"></div></div></div>
                    <div class="day-cell"><div class="day-number">21</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">22</div><div class="day-events"><div class="mini-event green"></div></div></div>
                    <div class="day-cell"><div class="day-number">23</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">24</div><div class="day-events"><div class="mini-event blue"></div></div></div>
                    <div class="day-cell"><div class="day-number">25</div><div class="day-events"><div class="mini-event orange"></div></div></div>
                    <div class="day-cell"><div class="day-number">26</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">27</div><div class="day-events"><div class="mini-event green"></div><div class="mini-event blue"></div></div></div>
                    <div class="day-cell"><div class="day-number">28</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">29</div><div class="day-events"><div class="mini-event red"></div></div></div>
                    <div class="day-cell"><div class="day-number">30</div><div class="day-events"></div></div>
                    <div class="day-cell"><div class="day-number">31</div><div class="day-events"><div class="mini-event blue"></div></div></div>
                    <div class="day-cell other-month"><div class="day-number">1</div></div>
                    <div class="day-cell other-month"><div class="day-number">2</div></div>
                    <div class="day-cell other-month"><div class="day-number">3</div></div>
                    <div class="day-cell other-month"><div class="day-number">4</div></div>
                    <div class="day-cell other-month"><div class="day-number">5</div></div>
                    <div class="day-cell other-month"><div class="day-number">6</div></div>
                    <div class="day-cell other-month"><div class="day-number">7</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function addEvent() {
            alert('即将打开新建日程表单...');
        }
    </script>
</body>
</html>
